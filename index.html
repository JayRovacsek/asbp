<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Settle Down Scotty!</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f8f5ec;
      --fg: #1c1713;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #11100f;
        --fg: #fff3dc;
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 50% 45%, color-mix(in srgb, var(--fg) 12%, transparent), transparent 38%),
        var(--bg);
      color: var(--fg);
      font-family: ui-rounded, "Arial Rounded MT Bold", system-ui, sans-serif;
    }

    .stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: grid;
      place-items: center;
    }

    .face {
      position: relative;
      z-index: 1;
      width: min(25vw, 25vh);
      max-width: 75vmin;
      border-radius: 50%;
      filter: drop-shadow(0 2rem 3rem rgb(0 0 0 / 45%));
      animation: grow-wobble 4.5s ease-in-out infinite;
      transform-origin: 50% 55%;
      user-select: none;
    }

    .face.spin {
      animation:
        grow-wobble 4.5s ease-in-out infinite,
        party-spin 900ms cubic-bezier(.3, 1.4, .55, 1) 1;
    }

    .face.spin.reverse {
      animation-name: grow-wobble, party-spin-reverse;
    }

    .emoji {
      position: fixed;
      left: var(--start-x);
      bottom: -3rem;
      z-index: 2;
      pointer-events: none;
      font-size: var(--size);
      transform: translate(-50%, 0);
      animation: fly-up var(--duration) ease-out forwards;
      text-shadow: 0 .35rem .8rem rgb(0 0 0 / 35%);
    }

    @keyframes grow-wobble {

      0%,
      100% {
        width: min(25vw, 25vh);
        transform: rotate(-2deg) scale(1);
      }

      25% {
        transform: rotate(5deg) scale(1.02);
      }

      50% {
        width: min(75vw, 75vh);
        transform: rotate(-4deg) scale(1.01);
      }

      75% {
        transform: rotate(4deg) scale(.99);
      }
    }

    @keyframes party-spin {
      to {
        rotate: 360deg;
      }
    }

    @keyframes party-spin-reverse {
      to {
        rotate: -360deg;
      }
    }

    @keyframes fly-up {
      0% {
        opacity: 0;
        transform: translate(-50%, 0) rotate(0deg) scale(.8);
      }

      10% {
        opacity: 1;
      }

      55% {
        opacity: 1;
        transform: translate(calc(-50% + (var(--drift) / 2) + var(--arc)), calc(-.55 * var(--rise))) rotate(calc(var(--turn) / 2)) scale(1.15);
      }

      100% {
        opacity: 0;
        transform: translate(calc(-50% + var(--drift)), calc(-1 * var(--rise))) rotate(var(--turn)) scale(1.25);
      }
    }

    @media (prefers-reduced-motion: reduce) {

      .face,
      .face.spin,
      .emoji {
        animation: none;
      }

      .face {
        width: min(50vw, 50vh);
      }
    }
  </style>
</head>

<body>
  <main class="stage" aria-label="Bucks party celebration">
    <img class="face" alt="Bucks party centrepiece" />
  </main>

  <script>
    // Randomly select one of the available images on each page load.
    const face = document.querySelector('.face');
    face.src = `./assets/${Math.floor(Math.random() * 3) + 1}.png`;
    const emojis = ['🎉', '🍻', '🍺', '🥂', '🍾', '🥳', '✨'];
    const prefersReducedMotion = matchMedia('(prefers-reduced-motion: reduce)');

    function randomBetween(min, max) {
      return Math.random() * (max - min) + min;
    }

    function launchEmoji() {
      if (prefersReducedMotion.matches) {
        return;
      }

      const emoji = document.createElement('span');
      emoji.className = 'emoji';
      emoji.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      emoji.style.setProperty('--start-x', `${randomBetween(18, 82)}vw`);
      emoji.style.setProperty('--rise', `${randomBetween(10, 50)}vh`);
      emoji.style.setProperty('--drift', `${randomBetween(-22, 22)}vw`);
      emoji.style.setProperty('--arc', `${randomBetween(-18, 18)}vw`);
      emoji.style.setProperty('--turn', `${randomBetween(-220, 220)}deg`);
      emoji.style.setProperty('--size', `${randomBetween(2, 4.5)}rem`);
      emoji.style.setProperty('--duration', `${randomBetween(1.8, 3.2)}s`);
      document.body.appendChild(emoji);
      emoji.addEventListener('animationend', () => emoji.remove(), { once: true });
    }

    function maybeSpin() {
      if (prefersReducedMotion.matches) {
        return;
      }

      face.classList.toggle('reverse', Math.random() > 0.5);
      face.classList.add('spin');
      face.addEventListener('animationend', event => {
        if (event.animationName.startsWith('party-spin')) {
          face.classList.remove('spin', 'reverse');
        }
      }, { once: true });
    }

    setInterval(launchEmoji, 650);
    setInterval(() => {
      if (Math.random() > 0.45) {
        maybeSpin();
      }
    }, 3500);
  </script>
</body>

</html>
